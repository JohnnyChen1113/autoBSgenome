<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoBSgenome — Taxonomy Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phylocanvas/phylocanvas.gl@latest/dist/bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #003DA5; --text: #1a1a2e; --text-muted: #7a7a9a;
    --bg: #fff; --border: #e2e5eb; --success: #0f7b3f;
  }
  body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  h1 { font-family: 'Source Serif 4', serif; }

  header { border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 18px; text-decoration: none; color: var(--text); }
  .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; }
  nav a { color: var(--text-muted); text-decoration: none; margin-left: 16px; font-size: 14px; transition: color 0.15s; }
  nav a:hover { color: var(--text); }

  .toolbar { padding: 10px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .toolbar input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; width: 260px; outline: none; }
  .toolbar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,61,165,0.08); }
  .search-info { font-size: 12px; color: var(--text-muted); }
  .btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .layout-group { display: flex; gap: 4px; }
  .legend { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); margin-left: auto; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .stats-bar { padding: 6px 20px; background: #f8f9fb; border-bottom: 1px solid var(--border); display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .stats-bar strong { color: var(--text); }

  .main { display: flex; flex: 1; overflow: hidden; }
  #tree-container { flex: 1; position: relative; background: #fcfcfd; }
  #tree-container canvas { display: block; }

  /* Info panel */
  #info-panel { width: 320px; border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: none; background: white; }
  #info-panel.open { display: block; }
  .info-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .info-header h3 { font-family: 'Source Serif 4', serif; font-size: 16px; font-style: italic; line-height: 1.3; }
  .info-header .common { font-size: 13px; color: var(--text-muted); font-style: normal; margin-top: 2px; }
  .info-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-muted); padding: 0 4px; }
  .info-close:hover { color: var(--text); }
  .info-body { padding: 12px 16px; }
  .info-row { display: flex; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f0f0f5; }
  .info-row:last-child { border-bottom: none; }
  .info-label { width: 90px; color: var(--text-muted); flex-shrink: 0; }
  .info-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; word-break: break-all; }
  .info-val a { color: var(--primary); text-decoration: none; }
  .info-val a:hover { text-decoration: underline; }
  .info-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-top: 8px; }
  .info-badge.available { background: #e6f4ea; color: var(--success); }
  .info-actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .info-actions a { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-size: 13px; text-decoration: none; font-weight: 500; }
  .info-actions .btn-primary { background: var(--primary); color: white; }
  .info-actions .btn-primary:hover { opacity: 0.9; }
  .info-actions .btn-outline { border: 1px solid var(--border); color: var(--text); }
  .info-actions .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .info-taxon { padding: 12px 16px; border-top: 1px solid var(--border); }
  .info-taxon h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .taxon-path { font-size: 12px; line-height: 1.8; }
  .taxon-path span { display: inline-block; padding: 1px 8px; background: #f0f2f5; border-radius: 4px; margin: 2px 4px 2px 0; }
  .taxon-path .arrow { background: none; padding: 0; color: var(--text-muted); }

  .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); z-index: 10; }
  .loading-text { font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <a href="./" class="logo">
    <div class="logo-icon">BS</div>
    <span>Taxonomy Tree</span>
  </a>
  <nav>
    <a href="./">Browse Packages</a>
    <a href="https://autobsgenome.pages.dev">Build a Package</a>
    <a href="https://autobsgenome.pages.dev/api-docs">API</a>
    <a href="https://github.com/JohnnyChen1113/autoBSgenome">GitHub</a>
  </nav>
</header>

<div class="stats-bar" id="stats-bar" style="display:none;">
  <span><strong id="st-species">0</strong> species</span>
  <span><strong id="st-orders">0</strong> orders</span>
  <span><strong id="st-families">0</strong> families</span>
  <span><strong id="st-packages">0</strong> packages</span>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search organism or taxon..." autocomplete="off" />
  <span class="search-info" id="search-info"></span>
  <div class="layout-group">
    <button class="btn active" data-type="rc">Rectangular</button>
    <button class="btn" data-type="rd">Radial</button>
    <button class="btn" data-type="dg">Diagonal</button>
    <button class="btn" data-type="hr">Hierarchical</button>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div class="main">
  <div id="tree-container">
    <div class="loading-overlay" id="loading">
      <span class="loading-text">Loading taxonomy data...</span>
    </div>
  </div>
  <div id="info-panel">
    <div class="info-header">
      <div>
        <h3 id="info-name"></h3>
        <div class="common" id="info-common"></div>
      </div>
      <button class="info-close" id="info-close">&times;</button>
    </div>
    <div class="info-body" id="info-body"></div>
    <div class="info-taxon" id="info-taxon"></div>
    <div class="info-actions" id="info-actions"></div>
  </div>
</div>

<script>
const { PhylocanvasGL, TreeTypes } = phylocanvas;

// Taxonomy group colors
const GROUP_COLORS = {
  vertebrate_mammalian: { color: '#D45B07', rgb: [212, 91, 7],   label: 'Mammals' },
  vertebrate_other:     { color: '#2E86AB', rgb: [46, 134, 171], label: 'Other Vertebrates' },
  invertebrate:         { color: '#A23B72', rgb: [162, 59, 114], label: 'Invertebrates' },
  plant:                { color: '#3B7D3C', rgb: [59, 125, 60],  label: 'Plants' },
  fungi:                { color: '#8B6914', rgb: [139, 105, 20], label: 'Fungi' },
  bacteria:             { color: '#607D8B', rgb: [96, 125, 139], label: 'Bacteria' },
  archaea:              { color: '#795548', rgb: [121, 85, 72],  label: 'Archaea' },
  other:                { color: '#999999', rgb: [153, 153, 153], label: 'Other' }
};

// Metadata store: leafId -> organism data
const META = {};
let tree = null;

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
  if (bytes > 1e6) return (bytes / 1e6).toFixed(0) + ' MB';
  return (bytes / 1e3).toFixed(0) + ' KB';
}

// Convert taxonomy hierarchy to Newick string
function toNewick(node) {
  if (!node.children || node.children.length === 0) {
    // Leaf node — use sanitized name as ID
    return sanitizeId(node.name);
  }
  const childStrs = node.children.map(c => toNewick(c));
  const name = sanitizeId(node.name);
  return `(${childStrs.join(',')})${name}`;
}

function sanitizeId(name) {
  // Newick doesn't allow spaces, parens, commas, colons, semicolons in unquoted labels
  // Use single quotes for names with special chars
  if (/[,;:()\[\]\s']/.test(name)) {
    return "'" + name.replace(/'/g, "''") + "'";
  }
  return name;
}

async function init() {
  const res = await fetch(`./packages.json?t=${Date.now()}`);
  const data = await res.json();
  const organisms = data.organisms || [];

  if (!organisms.length) {
    document.getElementById('loading').innerHTML = '<span class="loading-text">No packages found.</span>';
    return;
  }

  // Build hierarchy from taxonomy
  const root = { name: 'Life', children: [] };
  const groupsUsed = new Set();

  organisms.forEach(org => {
    const tax = org.taxonomy || {};
    const group = org.group || 'other';
    groupsUsed.add(group);

    const ranks = ['domain', 'kingdom', 'phylum', 'class', 'order', 'family', 'genus'];
    const path = [];
    for (const rank of ranks) {
      if (tax[rank]) path.push(tax[rank]);
    }
    // Species leaf
    const speciesParts = org.organism.split(/\s+/);
    const speciesName = speciesParts.length >= 2 ? speciesParts.slice(0, 2).join(' ') : org.organism;
    path.push(speciesName);

    let node = root;
    for (let i = 0; i < path.length; i++) {
      const name = path[i];
      let child = node.children?.find(c => c.name === name);
      if (!child) {
        child = { name, children: [], _rank: ranks[i] || 'species' };
        node.children.push(child);
      }
      node = child;
    }
    // Store metadata for this leaf
    META[speciesName] = { org, group };
  });

  // Sort children alphabetically
  function sortTree(node) {
    if (node.children) {
      node.children.sort((a, b) => a.name.localeCompare(b.name));
      node.children.forEach(sortTree);
    }
  }
  sortTree(root);

  // Compute dominant group for each internal node (for branch coloring)
  function computeGroup(node) {
    if (META[node.name]) return META[node.name].group;
    if (!node.children || !node.children.length) return 'other';
    const childGroups = node.children.map(c => computeGroup(c));
    node._group = childGroups.every(g => g === childGroups[0]) ? childGroups[0] : null;
    return node._group;
  }
  computeGroup(root);

  // Collect internal node names at certain ranks for initial collapsing
  const collapsedIds = [];
  function collectCollapsible(node, depth) {
    if (!node.children || !node.children.length) return;
    // Collapse at family level (depth ~6) if it has 3+ leaves
    if (node._rank === 'family' && node.children.length >= 3) {
      collapsedIds.push(node.name);
    }
    node.children.forEach(c => collectCollapsible(c, depth + 1));
  }
  collectCollapsible(root, 0);

  // Convert to Newick
  const newick = toNewick(root) + ';';

  // Build styles for ALL nodes (leaves + internal)
  const styles = {};
  // Leaf styles
  for (const [name, { group }] of Object.entries(META)) {
    const gc = GROUP_COLORS[group] || GROUP_COLORS.other;
    styles[name] = {
      fillColour: gc.color,
      strokeColour: gc.color,
      shape: 'circle',
      label: name,
    };
  }
  // Internal node styles — color branches by dominant group
  function applyInternalStyles(node) {
    if (!node.children || !node.children.length) return;
    if (node._group) {
      const gc = GROUP_COLORS[node._group] || GROUP_COLORS.other;
      styles[node.name] = {
        fillColour: gc.color,
        strokeColour: gc.color,
      };
    }
    node.children.forEach(applyInternalStyles);
  }
  applyInternalStyles(root);

  // Stats
  const orders = new Set();
  const families = new Set();
  organisms.forEach(o => {
    if (o.taxonomy?.order) orders.add(o.taxonomy.order);
    if (o.taxonomy?.family) families.add(o.taxonomy.family);
  });
  document.getElementById('st-species').textContent = organisms.length;
  document.getElementById('st-orders').textContent = orders.size;
  document.getElementById('st-families').textContent = families.size;
  document.getElementById('st-packages').textContent = data.flat?.length || organisms.reduce((s, o) => s + o.builds.length, 0);
  document.getElementById('stats-bar').style.display = '';

  // Legend
  const legendEl = document.getElementById('legend');
  for (const [key, { color, label }] of Object.entries(GROUP_COLORS)) {
    if (!groupsUsed.has(key)) continue;
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${color};"></span> ${label}`;
    legendEl.appendChild(item);
  }

  // Create Phylocanvas.gl tree
  const container = document.getElementById('tree-container');
  document.getElementById('loading').remove();

  tree = new PhylocanvasGL(container, {
    source: newick,
    type: TreeTypes.Rectangular,
    interactive: true,
    showLabels: true,
    showLeafLabels: true,
    showInternalLabels: true,
    fontFamily: 'Inter',
    fontSize: 12,
    nodeSize: 3,
    lineWidth: 1,
    padding: 24,
    alignLabels: true,
    styles: styles,
    fillColour: '#003DA5',
    strokeColour: '#444444',
    highlightColour: '#003DA5',
    haloWidth: 1,
    selectedColour: '#003DA5',
  });

  // Click handler — show info panel
  container.addEventListener('click', () => {
    // Small delay to let Phylocanvas process selection
    requestAnimationFrame(() => {
      const ids = tree.props?.selectedIds;
      if (ids && ids.length === 1) {
        const id = ids[0];
        showInfoPanel(id);
      }
    });
  });

  // Layout switcher
  const layoutBtns = document.querySelectorAll('.layout-group .btn');
  layoutBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      layoutBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const typeMap = {
        rc: TreeTypes.Rectangular,
        rd: TreeTypes.Radial,
        dg: TreeTypes.Diagonal,
        hr: TreeTypes.Hierarchical,
      };
      tree.setProps({ type: typeMap[btn.dataset.type] || TreeTypes.Rectangular });
    });
  });

  // Search
  let searchTimeout;
  const searchInput = document.getElementById('search');
  const searchInfo = document.getElementById('search-info');

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        searchInfo.textContent = '';
        tree.setProps({ selectedIds: [] });
        return;
      }
      // Find matching leaf IDs
      const matches = Object.keys(META).filter(name => {
        const m = META[name];
        return name.toLowerCase().includes(q) ||
          (m.org.common_name || '').toLowerCase().includes(q) ||
          (m.org.taxonomy?.order || '').toLowerCase().includes(q) ||
          (m.org.taxonomy?.family || '').toLowerCase().includes(q);
      });
      searchInfo.textContent = matches.length ? `${matches.length} found` : 'No matches';
      if (matches.length) {
        tree.setProps({ selectedIds: matches });
      }
    }, 250);
  });

  // Info panel close
  document.getElementById('info-close').addEventListener('click', () => {
    document.getElementById('info-panel').classList.remove('open');
    tree.setProps({ selectedIds: [] });
  });
}

function showInfoPanel(nodeId) {
  const meta = META[nodeId];
  if (!meta) return;

  const panel = document.getElementById('info-panel');
  const org = meta.org;
  const build = org.builds?.[0];

  document.getElementById('info-name').textContent = nodeId;
  document.getElementById('info-common').textContent = org.common_name || '';

  // Body
  let bodyHtml = '';
  if (build) {
    const rows = [
      ['Package', build.package],
      ['Assembly', build.assembly],
      ['Accession', build.accession ? `<a href="${build.source_url}" target="_blank">${build.accession}</a>` : '—'],
      ['Provider', build.provider || '—'],
      ['Sequences', build.seq_count ? build.seq_count.toLocaleString() : '—'],
      ['Size', formatSize(build.size)],
      ['Published', build.published ? new Date(build.published).toLocaleDateString() : '—'],
    ];
    rows.forEach(([label, val]) => {
      if (val) bodyHtml += `<div class="info-row"><span class="info-label">${label}</span><span class="info-val">${val}</span></div>`;
    });
    bodyHtml += '<div class="info-badge available">BSgenome available</div>';
  }
  document.getElementById('info-body').innerHTML = bodyHtml;

  // Taxonomy path
  const tax = org.taxonomy || {};
  const ranks = ['domain', 'kingdom', 'phylum', 'class', 'order', 'family', 'genus'];
  const crumbs = ranks.map(r => tax[r]).filter(Boolean);
  let taxHtml = '<h4>Taxonomy</h4><div class="taxon-path">';
  taxHtml += crumbs.map(c => `<span>${c}</span>`).join('<span class="arrow">&#x203A;</span>');
  taxHtml += '</div>';
  document.getElementById('info-taxon').innerHTML = taxHtml;

  // Actions
  let actionsHtml = '';
  if (build?.download_url) {
    actionsHtml += `<a class="btn-primary" href="${build.download_url}">Download .tar.gz</a>`;
  }
  if (build?.source_url) {
    actionsHtml += `<a class="btn-outline" href="${build.source_url}" target="_blank">View on NCBI</a>`;
  }
  document.getElementById('info-actions').innerHTML = actionsHtml;

  panel.classList.add('open');
}

init();
</script>
</body>
</html>
