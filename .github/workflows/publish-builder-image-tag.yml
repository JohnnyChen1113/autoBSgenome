name: Publish Builder Image Tag

on:
  push:
    branches: [main]
    paths:
      - "reproducibility/builder-image.env"
      - ".github/workflows/publish-builder-image-tag.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load builder release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          source reproducibility/builder-image.env

          [[ "$BUILDER_IMAGE" == ghcr.io/* ]]
          [[ "$BUILDER_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$BUILDER_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]

          echo "image=$BUILDER_IMAGE" >> "$GITHUB_OUTPUT"
          echo "version=$BUILDER_VERSION" >> "$GITHUB_OUTPUT"
          echo "digest=$BUILDER_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish fixed version tag
        env:
          IMAGE: ${{ steps.metadata.outputs.image }}
          VERSION: ${{ steps.metadata.outputs.version }}
          DIGEST: ${{ steps.metadata.outputs.digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --prefer-index=false \
            --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}@${DIGEST}"

      - name: Verify published digest
        env:
          IMAGE: ${{ steps.metadata.outputs.image }}
          VERSION: ${{ steps.metadata.outputs.version }}
          EXPECTED_DIGEST: ${{ steps.metadata.outputs.digest }}
        run: |
          set -euo pipefail
          ACTUAL_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" | awk '/^Digest:/ {print $2; exit}')
          echo "Expected ${EXPECTED_DIGEST}"
          echo "Observed ${ACTUAL_DIGEST}"
          test "$ACTUAL_DIGEST" = "$EXPECTED_DIGEST"
