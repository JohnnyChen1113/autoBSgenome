name: Zenodo request detail diagnostic
on: {workflow_dispatch: {}}
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect each community-inclusion request
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          python3 <<'PYEOF'
          import json, os, urllib.request
          req = urllib.request.Request(
            "https://zenodo.org/api/requests?size=100",
            headers={"Authorization": f"Bearer {os.environ['ZENODO_TOKEN']}", "Accept":"application/json"},
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              d = json.loads(r.read())
          for h in d.get("hits",{}).get("hits",[]):
              print(f"\n=== Request {h.get('id')} ===")
              print(f"  type: {h.get('type')}")
              print(f"  status: {h.get('status')}")
              print(f"  title: {h.get('title','')[:80]}")
              print(f"  topic: {h.get('topic')}")
              print(f"  receiver: {h.get('receiver')}")
              print(f"  created: {h.get('created')}")
              print(f"  updated: {h.get('updated')}")
              # Check if expanded info available
              print(f"  is_closed: {h.get('is_closed')}")
              print(f"  expires_at: {h.get('expires_at')}")
          PYEOF
