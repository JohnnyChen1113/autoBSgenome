name: Refresh Package Catalog

on:
  workflow_dispatch:
  schedule:
    # Daily at 8:30 AM UTC. This updates the browsable one-click build catalog;
    # it does not trigger package builds.
    - cron: "30 8 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout catalog generator
        uses: actions/checkout@v4
        with:
          ref: main
          path: _main
          sparse-checkout: scripts/generate-catalog.py
          sparse-checkout-cone-mode: false

      - name: Download NCBI RefSeq assembly summary
        run: |
          curl -fsSL --retry 3 --retry-delay 10 \
            https://ftp.ncbi.nlm.nih.gov/genomes/refseq/assembly_summary_refseq.txt \
            -o /tmp/assembly_summary_refseq.txt

      - name: Refresh catalog
        run: |
          python3 _main/scripts/generate-catalog.py \
            --existing-catalog catalog.json \
            --refseq-summary /tmp/assembly_summary_refseq.txt \
            --output catalog.json
          rm -rf _main

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --cached --quiet || {
            git commit -m "chore: Refresh package catalog"
            git push
          }
