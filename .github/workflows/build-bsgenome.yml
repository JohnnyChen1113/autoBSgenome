name: Build BSgenome Package
run-name: "Build ${{ github.event.client_payload.package_name }} (${{ github.event.client_payload.organism }})"

on:
  repository_dispatch:
    types: [build_bsgenome]

permissions:
  contents: write
  packages: read

# Use unique concurrency group per job_id so builds don't cancel each other
concurrency:
  group: build-${{ github.event.client_payload.job_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/johnnychen1113/autobsgenome-builder:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse build parameters
        id: params
        run: |
          echo "job_id=${{ github.event.client_payload.job_id }}" >> $GITHUB_OUTPUT
          echo "package_name=${{ github.event.client_payload.package_name }}" >> $GITHUB_OUTPUT
          echo "organism=${{ github.event.client_payload.organism }}" >> $GITHUB_OUTPUT
          echo "common_name=${{ github.event.client_payload.common_name }}" >> $GITHUB_OUTPUT
          echo "genome=${{ github.event.client_payload.genome }}" >> $GITHUB_OUTPUT
          echo "provider=${{ github.event.client_payload.provider }}" >> $GITHUB_OUTPUT
          echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          echo "circ_seqs=${{ github.event.client_payload.circ_seqs }}" >> $GITHUB_OUTPUT
          echo "accession=${{ github.event.client_payload.accession }}" >> $GITHUB_OUTPUT

          # Parse extra JSON into outputs in a single pass
          EXTRA='${{ github.event.client_payload.extra }}' python3 <<'PYEOF' >> $GITHUB_OUTPUT
          import json, os
          d = json.loads(os.environ['EXTRA'] or '{}')
          for key, default in (
              ('data_source', 'ncbi'),
              ('release_date', ''),
              ('title', ''),
              ('source_url', ''),
              ('species_url', ''),
              ('ensembl_group', ''),
          ):
              print(f'{key}={d.get(key, default)}')
          PYEOF

      - name: Download FASTA from NCBI
        if: steps.params.outputs.data_source == 'ncbi'
        run: |
          ACCESSION="${{ steps.params.outputs.accession }}"
          echo "Downloading FASTA for ${ACCESSION} from NCBI..."
          datasets download genome accession "${ACCESSION}" --include genome --filename genome.zip
          unzip -o genome.zip
          FASTA=$(find ncbi_dataset/data -name "*.fna" | head -1)
          if [ -z "$FASTA" ]; then
            echo "ERROR: No FASTA file found in download"
            exit 1
          fi
          cp "$FASTA" genome.fa
          ls -lh genome.fa

      - name: Download FASTA from Ensembl
        if: steps.params.outputs.data_source == 'ensembl'
        run: |
          SPECIES_URL="${{ steps.params.outputs.species_url }}"
          GROUP="${{ steps.params.outputs.ensembl_group }}"
          ACCESSION="${{ steps.params.outputs.accession }}"

          if [ -z "$SPECIES_URL" ] || [ -z "$GROUP" ]; then
            echo "ERROR: missing species_url ($SPECIES_URL) or group ($GROUP) in payload"
            exit 1
          fi

          echo "Resolving Ensembl FASTA: species_url=$SPECIES_URL group=$GROUP accession=$ACCESSION"
          URL=$(python3 scripts/resolve_ensembl_fasta.py "$SPECIES_URL" "$GROUP" "$ACCESSION")
          if [ -z "$URL" ]; then
            echo "ERROR: resolver returned empty URL"
            exit 1
          fi
          echo "Resolved: $URL"
          curl -fL -o genome.fa.gz "$URL"
          gunzip genome.fa.gz
          ls -lh genome.fa

      - name: Extract FASTA headers and stats
        id: fasta_info
        run: |
          # Get first 5 sequence IDs
          SEQ_IDS=$(grep "^>" genome.fa | head -5 | sed 's/^>//' | cut -d' ' -f1 | tr '\n' ',' | sed 's/,$//')
          echo "seq_ids=${SEQ_IDS}" >> $GITHUB_OUTPUT
          # Get total sequence count
          SEQ_COUNT=$(grep -c "^>" genome.fa)
          echo "seq_count=${SEQ_COUNT}" >> $GITHUB_OUTPUT
          # Get FASTA file size
          FASTA_SIZE=$(stat -c%s genome.fa 2>/dev/null || stat -f%z genome.fa 2>/dev/null || echo "0")
          echo "fasta_size=${FASTA_SIZE}" >> $GITHUB_OUTPUT
          echo "Sequences: ${SEQ_COUNT}, First IDs: ${SEQ_IDS}, FASTA size: ${FASTA_SIZE}"

      - name: Convert FASTA to 2bit
        run: |
          faToTwoBit genome.fa genome.2bit
          ls -lh genome.2bit

      - name: Generate seed file and build package
        run: |
          PACKAGE="${{ steps.params.outputs.package_name }}"
          TITLE="${{ steps.params.outputs.title }}"
          ORGANISM="${{ steps.params.outputs.organism }}"
          COMMON="${{ steps.params.outputs.common_name }}"
          GENOME="${{ steps.params.outputs.genome }}"
          PROVIDER="${{ steps.params.outputs.provider }}"
          RELEASE_DATE="${{ steps.params.outputs.release_date }}"
          VERSION="${{ steps.params.outputs.version }}"
          CIRC="${{ steps.params.outputs.circ_seqs }}"
          SOURCE_URL="${{ steps.params.outputs.source_url }}"
          OBJNAME=$(echo "$PACKAGE" | cut -d. -f2)

          # Format circ_seqs for R
          if [ "$CIRC" = "character(0)" ] || [ -z "$CIRC" ]; then
            CIRC_R="character(0)"
          else
            CIRC_R="c($(echo "$CIRC" | sed 's/[[:space:]]*,[[:space:]]*/", "/g' | sed 's/^/"/' | sed 's/$/"/'))"
          fi

          # Generate seed file
          cat > "${PACKAGE}.seed" <<SEED
          Package: ${PACKAGE}
          Title: ${TITLE:-Full genome sequences for ${ORGANISM} (${PROVIDER} version ${GENOME})}
          Description: Full genome sequences for ${ORGANISM} (${COMMON}) as provided by ${PROVIDER} (${GENOME}, ${RELEASE_DATE}) and stored in Biostrings objects.
          Version: ${VERSION}
          organism: ${ORGANISM}
          common_name: ${COMMON}
          genome: ${GENOME}
          provider: ${PROVIDER}
          release_date: ${RELEASE_DATE}
          source_url: ${SOURCE_URL}
          organism_biocview: $(echo "${ORGANISM}" | tr ' ' '_')
          BSgenomeObjname: ${OBJNAME}
          circ_seqs: ${CIRC_R}
          seqs_srcdir: $(pwd)
          seqfile_name: genome.2bit
          SEED
          sed -i 's/^          //' "${PACKAGE}.seed"
          echo "=== Seed file ===" && cat "${PACKAGE}.seed"

          # Build
          Rscript -e "
            suppressPackageStartupMessages(library(BSgenome))
            tryCatch({
              forgeBSgenomeDataPkg('${PACKAGE}.seed')
            }, error = function(e) {
              message('forgeBSgenomeDataPkg error: ', e\$message)
              message('Attempting manual package creation...')
              dir.create('./${PACKAGE}/inst/extdata/', recursive = TRUE, showWarnings = FALSE)
              file.copy('./genome.2bit', './${PACKAGE}/inst/extdata/single_sequences.2bit')
            })
          "
          R CMD build "${PACKAGE}"
          ls -lh ${PACKAGE}_*.tar.gz

      - name: Determine storage backend
        id: storage
        run: |
          PACKAGE="${{ steps.params.outputs.package_name }}"
          VERSION="${{ steps.params.outputs.version }}"
          TARBALL="${PACKAGE}_${VERSION}.tar.gz"
          SIZE=$(stat -c%s "${TARBALL}" 2>/dev/null || stat -f%z "${TARBALL}" 2>/dev/null || echo "0")
          # GitHub Releases hard-cap is 2 GiB per asset. Use Zenodo above 1.9 GiB
          # for safety margin (headers, multipart boundaries).
          LIMIT=$((1900 * 1024 * 1024))
          if [ "$SIZE" -ge "$LIMIT" ]; then
            echo "backend=zenodo" >> $GITHUB_OUTPUT
            echo "Oversized tarball ($SIZE bytes); using Zenodo backend"
          else
            echo "backend=github" >> $GITHUB_OUTPUT
            echo "Standard tarball ($SIZE bytes); using GitHub Releases"
          fi
          echo "tarball_size=$SIZE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.storage.outputs.backend == 'github'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          JOB_ID="${{ steps.params.outputs.job_id }}"
          PACKAGE="${{ steps.params.outputs.package_name }}"
          VERSION="${{ steps.params.outputs.version }}"
          TAG="build-${JOB_ID}"
          TARBALL="${PACKAGE}_${VERSION}.tar.gz"

          gh release delete "${TAG}" --yes 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            "${TARBALL}" \
            --title "${PACKAGE} ${VERSION}" \
            --notes "Built by [AutoBSgenome Web](https://autobsgenome.pages.dev).

          **Install in R:**
          \`\`\`r
          install.packages(\"https://github.com/${{ github.repository }}/releases/download/${TAG}/${TARBALL}\", repos = NULL, type = \"source\")
          \`\`\`

          > This release will be automatically cleaned up after 14 days."

      - name: Publish to permanent repository
        if: steps.storage.outputs.backend == 'github'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          PACKAGE="${{ steps.params.outputs.package_name }}"
          VERSION="${{ steps.params.outputs.version }}"
          ORGANISM="${{ steps.params.outputs.organism }}"
          ASSEMBLY="${{ steps.params.outputs.genome }}"
          PROVIDER="${{ steps.params.outputs.provider }}"
          TARBALL="${PACKAGE}_${VERSION}.tar.gz"
          PERM_TAG="pkg-${PACKAGE}"
          ACCESSION="${{ steps.params.outputs.accession }}"
          LOCAL_SIZE=$(stat -c%s "${TARBALL}" 2>/dev/null || stat -f%z "${TARBALL}" 2>/dev/null || echo "0")

          # Inspect any existing release. A draft means a prior upload was
          # interrupted — delete so we can retry cleanly. A non-draft release
          # with the same asset size is already good; skip the re-upload to
          # save ~500 MB-2 GB of redundant bandwidth on large genomes.
          EXISTING=$(gh release view "${PERM_TAG}" --json isDraft,assets 2>/dev/null || echo '{}')
          IS_DRAFT=$(echo "$EXISTING" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('isDraft', 'missing'))")
          EXISTING_SIZE=$(echo "$EXISTING" | python3 -c "import json,sys; d=json.load(sys.stdin); a=d.get('assets',[]); print(a[0].get('size',0) if a else 0)")

          if [ "$IS_DRAFT" = "True" ]; then
            echo "Existing release is a draft (orphan from interrupted upload); deleting and re-uploading"
            gh release delete "${PERM_TAG}" --yes --cleanup-tag 2>/dev/null || true
          elif [ "$IS_DRAFT" = "False" ] && [ "$EXISTING_SIZE" = "$LOCAL_SIZE" ]; then
            echo "Release already published with matching tarball size ($EXISTING_SIZE bytes); skipping re-upload"
            SKIP_UPLOAD=1
          elif [ "$IS_DRAFT" = "False" ]; then
            echo "Existing release has different asset size ($EXISTING_SIZE vs local $LOCAL_SIZE); replacing"
            gh release delete "${PERM_TAG}" --yes --cleanup-tag 2>/dev/null || true
          fi

          if [ "${SKIP_UPLOAD:-0}" != "1" ]; then
          gh release create "${PERM_TAG}" \
            "${TARBALL}" \
            --title "${PACKAGE} ${VERSION}" \
            --notes "| | |
          |---|---|
          | **Organism** | ${ORGANISM} |
          | **Assembly** | ${ASSEMBLY} |
          | **Provider** | ${PROVIDER} |
          | **Accession** | [\`${ACCESSION}\`](https://www.ncbi.nlm.nih.gov/datasets/genome/${ACCESSION}/) |
          | **Version** | ${VERSION} |
          | **Package** | \`${PACKAGE}\` |

          **Install in R:**
          \`\`\`r
          install.packages(\"${PACKAGE}\", repos = \"https://johnnychen1113.github.io/autoBSgenome\")
          \`\`\`

          > [Browse all packages](https://johnnychen1113.github.io/autoBSgenome) | [Build your own](https://autobsgenome.pages.dev)

          Published via [AutoBSgenome](https://autobsgenome.pages.dev)."
          fi  # end: if SKIP_UPLOAD != 1

          # Trigger index update on gh-pages
          FILESIZE=$(stat -c%s "${TARBALL}" 2>/dev/null || stat -f%z "${TARBALL}" 2>/dev/null || echo "0")
          SEQ_IDS="${{ steps.fasta_info.outputs.seq_ids }}"
          SEQ_COUNT="${{ steps.fasta_info.outputs.seq_count }}"
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=update_repo_index \
            -f "client_payload[package_name]=${PACKAGE}" \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[organism]=${ORGANISM}" \
            -f "client_payload[assembly]=${ASSEMBLY}" \
            -f "client_payload[provider]=${PROVIDER}" \
            -f "client_payload[accession]=${ACCESSION}" \
            -f "client_payload[file_name]=${TARBALL}" \
            -f "client_payload[file_size]=${FILESIZE}" \
            -f "client_payload[seq_ids]=${SEQ_IDS}" \
            -f "client_payload[seq_count]=${SEQ_COUNT}"

      - name: Publish oversized tarball to Zenodo
        if: steps.storage.outputs.backend == 'zenodo'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          PACKAGE="${{ steps.params.outputs.package_name }}"
          VERSION="${{ steps.params.outputs.version }}"
          ORGANISM="${{ steps.params.outputs.organism }}"
          ASSEMBLY="${{ steps.params.outputs.genome }}"
          PROVIDER="${{ steps.params.outputs.provider }}"
          ACCESSION="${{ steps.params.outputs.accession }}"
          TARBALL="${PACKAGE}_${VERSION}.tar.gz"
          SEQ_IDS="${{ steps.fasta_info.outputs.seq_ids }}"
          SEQ_COUNT="${{ steps.fasta_info.outputs.seq_count }}"

          # Source URL points at NCBI or Ensembl depending on the data source
          SOURCE_URL="${{ steps.params.outputs.source_url }}"
          if [ -z "$SOURCE_URL" ]; then
            if [ "${{ steps.params.outputs.data_source }}" = "ensembl" ]; then
              SOURCE_URL="https://www.ensembl.org/"
            else
              SOURCE_URL="https://www.ncbi.nlm.nih.gov/datasets/genome/${ACCESSION}/"
            fi
          fi

          # Rich HTML description so Zenodo's record page clearly shows provenance
          DESC="<p>BSgenome data package for <i>${ORGANISM}</i> (assembly <code>${ASSEMBLY}</code>), generated by <a href='https://autobsgenome.pages.dev'>autoBSgenome</a> from the ${PROVIDER} reference assembly.</p><table><tr><th>Organism</th><td>${ORGANISM}</td></tr><tr><th>Assembly</th><td>${ASSEMBLY}</td></tr><tr><th>Data source</th><td><b>${PROVIDER}</b></td></tr><tr><th>Accession</th><td><a href='${SOURCE_URL}'>${ACCESSION}</a></td></tr><tr><th>Package</th><td><code>${PACKAGE}</code></td></tr></table><p><b>Install in R:</b></p><pre>install.packages(\"DOWNLOAD_URL_HERE\", repos = NULL, type = \"source\")</pre><p>Part of the <a href='https://zenodo.org/communities/autobsgenome'>autoBSgenome</a> community. autoBSgenome builds Bioconductor-compatible BSgenome packages from any reference genome assembly — from public databases (NCBI, Ensembl) or from user-provided FASTA. Records in this community archive the tarballs that exceed GitHub Releases' 2 GiB asset limit; smaller packages are hosted on GitHub Releases under the same project.</p>"

          python3 scripts/zenodo_upload.py upload "${TARBALL}" \
            --title "${PACKAGE} ${VERSION} (${PROVIDER} — ${ORGANISM})" \
            --description "${DESC}" \
            --creator "Chen, Junhao" \
            --creator "Lin, Zhenguo" \
            --license "artistic-2.0" \
            --community "autobsgenome" \
            --keywords "BSgenome,Bioconductor,${ORGANISM},${PROVIDER},${ASSEMBLY},autoBSgenome,R package,reference genome,eukaryote" \
            --related "${SOURCE_URL},https://github.com/${{ github.repository }},https://autobsgenome.pages.dev" \
            > /tmp/zenodo.json

          cat /tmp/zenodo.json
          DOI=$(python3 -c "import json;print(json.load(open('/tmp/zenodo.json'))['doi'] or '')")
          URL=$(python3 -c "import json;print(json.load(open('/tmp/zenodo.json'))['download_url'])")
          FILESIZE="${{ steps.storage.outputs.tarball_size }}"

          echo "Zenodo DOI: $DOI"
          echo "Zenodo URL: $URL"

          # repository_dispatch client_payload is capped at 10 properties, so
          # pack storage+doi+download_url into a single JSON field.
          STORAGE_INFO=$(python3 -c "import json,os; print(json.dumps({'storage':'zenodo','doi':os.environ['DOI'],'download_url':os.environ['URL']}))" \
            DOI="$DOI" URL="$URL" 2>/dev/null || \
            python3 -c "import json,sys; print(json.dumps({'storage':'zenodo','doi':sys.argv[1],'download_url':sys.argv[2]}))" "$DOI" "$URL")

          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=update_repo_index \
            -f "client_payload[package_name]=${PACKAGE}" \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[organism]=${ORGANISM}" \
            -f "client_payload[assembly]=${ASSEMBLY}" \
            -f "client_payload[provider]=${PROVIDER}" \
            -f "client_payload[accession]=${ACCESSION}" \
            -f "client_payload[file_name]=${TARBALL}" \
            -f "client_payload[file_size]=${FILESIZE}" \
            -f "client_payload[seq_ids]=${SEQ_IDS}" \
            -f "client_payload[storage_info]=${STORAGE_INFO}"

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          JOB_ID="${{ steps.params.outputs.job_id }}"
          TAG="build-${JOB_ID}"
          gh release create "${TAG}" \
            --title "Build Failed - ${JOB_ID}" \
            --notes "BUILD_FAILED: The BSgenome package build encountered an error. Please check your input parameters and try again." \
            2>/dev/null || true
