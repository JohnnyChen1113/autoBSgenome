name: Update Repository Index

on:
  repository_dispatch:
    types: [update_repo_index]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Checkout metadata tools
        uses: actions/checkout@v4
        with:
          ref: main
          path: _main
          sparse-checkout: |
            scripts/apply-repo-index-update.py
            scripts/validate-packages-metadata.py
          sparse-checkout-cone-mode: false

      - name: Apply index update and push
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin gh-pages
            git reset --hard origin/gh-pages

            python3 _main/scripts/apply-repo-index-update.py
            python3 _main/scripts/validate-packages-metadata.py \
              packages.json \
              --require-provenance-package '${{ github.event.client_payload.package_name }}'

            git add packages.json src/contrib/PACKAGES build-queue.json provenance/builds.jsonl
            if git diff --cached --quiet; then
              echo "Nothing to commit"
              exit 0
            fi
            git commit -m "Update repository index: ${{ github.event.client_payload.package_name }}"

            if git push origin HEAD:gh-pages; then
              exit 0
            fi
            echo "Push attempt ${attempt} rejected; retrying from latest gh-pages..."
            sleep $((attempt * 2))
          done
          echo "ERROR: push still failing after 5 attempts"
          exit 1
