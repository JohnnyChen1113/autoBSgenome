name: Update Repository Index

on:
  repository_dispatch:
    types: [update_repo_index]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update packages.json
        run: |
          PACKAGE='${{ github.event.client_payload.package_name }}'
          VERSION='${{ github.event.client_payload.version }}'
          ORGANISM='${{ github.event.client_payload.organism }}'
          ASSEMBLY='${{ github.event.client_payload.assembly }}'
          PROVIDER='${{ github.event.client_payload.provider }}'
          ACCESSION='${{ github.event.client_payload.accession }}'
          FILE_NAME='${{ github.event.client_payload.file_name }}'
          FILE_SIZE='${{ github.event.client_payload.file_size }}'
          SEQ_IDS='${{ github.event.client_payload.seq_ids }}'
          SEQ_COUNT='${{ github.event.client_payload.seq_count }}'

          # Add or update entry in packages.json (supports organism-centric format)
          python3 -c "
          import json
          with open('packages.json', 'r') as f:
              data = json.load(f)

          # Handle both formats
          if isinstance(data, dict) and 'flat' in data:
              flat = data['flat']
          elif isinstance(data, list):
              flat = data
          else:
              flat = []

          # Remove existing entry for this package
          flat = [p for p in flat if p.get('package') != '${PACKAGE}']

          # Fetch taxonomy from NCBI
          taxonomy = {}
          group = 'other'
          common_name = ''
          try:
              import urllib.request, urllib.parse
              encoded = urllib.parse.quote('${ORGANISM}')
              url = f'https://api.ncbi.nlm.nih.gov/datasets/v2/taxonomy/taxon/{encoded}/dataset_report'
              req = urllib.request.Request(url, headers={'Accept': 'application/json'})
              with urllib.request.urlopen(req, timeout=10) as resp:
                  tdata = json.loads(resp.read())
              tax = tdata.get('reports', [{}])[0].get('taxonomy', {})
              classification = tax.get('classification', {})
              for rank in ['domain', 'kingdom', 'phylum', 'class', 'order', 'family', 'genus']:
                  if rank in classification:
                      taxonomy[rank] = classification[rank]['name']
              common_name = tax.get('curator_common_name', '')
              # Set group from taxonomy
              kingdom = taxonomy.get('kingdom', '')
              phylum = taxonomy.get('phylum', '')
              if kingdom == 'Metazoa' and taxonomy.get('class') == 'Mammalia':
                  group = 'vertebrate_mammalian'
              elif kingdom == 'Metazoa' and phylum == 'Chordata':
                  group = 'vertebrate_other'
              elif kingdom == 'Metazoa':
                  group = 'invertebrate'
              elif kingdom == 'Viridiplantae' or phylum in ('Streptophyta', 'Chlorophyta'):
                  group = 'plant'
              elif kingdom == 'Fungi':
                  group = 'fungi'
              elif taxonomy.get('domain') == 'Bacteria':
                  group = 'bacteria'
              elif taxonomy.get('domain') == 'Archaea':
                  group = 'archaea'
          except Exception as e:
              print(f'Taxonomy lookup failed: {e}')

          # Add new entry
          new_entry = {
              'package': '${PACKAGE}',
              'version': '${VERSION}',
              'organism': '${ORGANISM}',
              'assembly': '${ASSEMBLY}',
              'provider': '${PROVIDER}',
              'accession': '${ACCESSION}',
              'source_url': 'https://www.ncbi.nlm.nih.gov/datasets/genome/${ACCESSION}/' if '${ACCESSION}' else '',
              'file_name': '${FILE_NAME}',
              'size': int('${FILE_SIZE}') if '${FILE_SIZE}'.isdigit() else 0,
              'seq_ids': '${SEQ_IDS}'.split(',') if '${SEQ_IDS}' else [],
              'seq_count': int('${SEQ_COUNT}') if '${SEQ_COUNT}'.isdigit() else 0,
              'group': group,
              'taxonomy': taxonomy,
              'common_name': common_name,
              'published': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              'download_url': 'https://github.com/${{ github.repository }}/releases/download/pkg-${PACKAGE}/${FILE_NAME}'
          }
          flat.append(new_entry)

          # Rebuild organism-centric format
          organisms = {}
          for pkg in flat:
              org = pkg.get('organism', 'Unknown') or 'Unknown'
              if org not in organisms:
                  organisms[org] = {
                      'organism': org,
                      'common_name': pkg.get('common_name', ''),
                      'group': pkg.get('group', 'other'),
                      'taxonomy': pkg.get('taxonomy', {}),
                      'builds': []
                  }
              organisms[org]['builds'].append(pkg)
              if pkg.get('group') and pkg['group'] != 'other' and organisms[org].get('group') == 'other':
                  organisms[org]['group'] = pkg['group']
              if pkg.get('taxonomy') and not organisms[org].get('taxonomy'):
                  organisms[org]['taxonomy'] = pkg['taxonomy']
              if pkg.get('common_name') and not organisms[org].get('common_name'):
                  organisms[org]['common_name'] = pkg['common_name']

          result = {
              'organisms': sorted(organisms.values(), key=lambda o: o['organism']),
              'flat': flat
          }

          with open('packages.json', 'w') as f:
              json.dump(result, f, indent=2)
          "
          echo "Updated packages.json:"
          cat packages.json

      - name: Update build-queue.json status
        run: |
          ORGANISM='${{ github.event.client_payload.organism }}'
          if [ -f build-queue.json ]; then
            python3 -c "
          import json
          with open('build-queue.json', 'r') as f:
              queue = json.load(f)
          updated = False
          for item in queue:
              if item.get('organism') == '${ORGANISM}' and item.get('status') in ('building', 'pending'):
                  item['status'] = 'done'
                  updated = True
                  break
          if updated:
              with open('build-queue.json', 'w') as f:
                  json.dump(queue, f)
              print(f'Marked {\"${ORGANISM}\"} as done in build-queue.json')
          else:
              print(f'No matching entry found for {\"${ORGANISM}\"}')
          "
          fi

      - name: Regenerate PACKAGES index
        run: |
          # Generate PACKAGES file from packages.json
          python3 -c "
          import json
          with open('packages.json', 'r') as f:
              data = json.load(f)
          pkgs = data.get('flat', data) if isinstance(data, dict) else data
          lines = []
          for p in pkgs:
              lines.append(f'Package: {p[\"package\"]}')
              lines.append(f'Version: {p[\"version\"]}')
              lines.append('NeedsCompilation: no')
              lines.append('')
          with open('src/contrib/PACKAGES', 'w') as f:
              f.write('\n'.join(lines))
          "
          echo "Updated PACKAGES:"
          cat src/contrib/PACKAGES

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages.json src/contrib/PACKAGES build-queue.json
          git diff --cached --quiet || git commit -m "Update repository index: ${{ github.event.client_payload.package_name }}"
          git push
