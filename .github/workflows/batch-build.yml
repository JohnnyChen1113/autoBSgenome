name: Batch Build BSgenome Packages

on:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of packages to build in this batch"
        default: "15"
        type: string

permissions:
  contents: write

concurrency:
  group: bsgenome-batch
  cancel-in-progress: false

jobs:
  build-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout gh-pages (for queue state)
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Check for pending builds
        id: queue
        run: |
          if [ ! -f build-queue.json ]; then
            echo "No build queue found. Run generate-build-queue.py first."
            echo "has_work=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          BATCH_SIZE="${{ inputs.batch_size || '15' }}"

          # First: mark 'building' items as 'done' if their pkg- release exists
          python3 -c "
          import json, subprocess
          with open('build-queue.json') as f:
              queue = json.load(f)

          # Get existing pkg- releases
          result = subprocess.run(
              ['gh', 'release', 'list', '--repo', '${{ github.repository }}', '--limit', '500', '--json', 'tagName'],
              capture_output=True, text=True
          )
          existing_tags = set()
          try:
              existing_tags = {r['tagName'] for r in json.loads(result.stdout)}
          except:
              pass

          updated = 0
          for item in queue:
              if item['status'] in ('building', 'pending'):
                  if not item.get('organism') or not item.get('assembly'):
                      continue
                  parts = item['organism'].split()
                  abbrev = parts[0][0].upper() + parts[1].lower() if len(parts) >= 2 else parts[0]
                  assembly = (item['assembly'] or '').replace('.','').replace(' ','').replace('-','').replace('_','')
                  provider = 'Ensembl' if item.get('data_source') == 'ensembl' else 'NCBI'
                  pkg_tag = f'pkg-BSgenome.{abbrev}.{provider}.{assembly}'
                  if pkg_tag in existing_tags:
                      item['status'] = 'done'
                      updated += 1

          if updated > 0:
              with open('build-queue.json', 'w') as f:
                  json.dump(queue, f)
              print(f'Marked {updated} items as done')
          " || true

          # Then: pick next batch
          python3 -c "
          import json
          with open('build-queue.json') as f:
              queue = json.load(f)
          pending = [item for item in queue if item['status'] == 'pending' and item.get('accession') and item.get('assembly') and item.get('organism')]
          batch = pending[:${BATCH_SIZE}]
          print(f'Pending: {len(pending)}, Batch size: {len(batch)}')
          if not batch:
              print('NO_WORK')
          else:
              with open('batch.json', 'w') as f:
                  json.dump(batch, f)
              for item in batch:
                  print(f'  - {item[\"accession\"]} {item[\"organism\"]} [{item.get(\"data_source\",\"ncbi\")}]')
          " > /tmp/queue_check.txt
          cat /tmp/queue_check.txt

          if grep -q "NO_WORK" /tmp/queue_check.txt; then
            echo "has_work=false" >> $GITHUB_OUTPUT
          else
            echo "has_work=true" >> $GITHUB_OUTPUT
          fi

      - name: Failure-rate circuit breaker
        if: steps.queue.outputs.has_work == 'true'
        id: breaker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: |
          # Skip dispatch when recent build-bsgenome failure rate >= 80%. Cron retries
          # next tick, so the breaker auto-clears once a systemic issue is fixed.
          python3 <<'PYEOF'
          import json, os, subprocess
          r = subprocess.run(
              ['gh', 'run', 'list', '--workflow', 'build-bsgenome.yml',
               '--repo', os.environ['GITHUB_REPOSITORY'], '--limit', '30',
               '--status', 'completed', '--json', 'conclusion'],
              capture_output=True, text=True
          )
          runs = json.loads(r.stdout or '[]') if r.returncode == 0 else []
          breaker_open = False
          if r.returncode != 0:
              print('Could not query run history; allowing batch to proceed')
          elif len(runs) < 10:
              print(f'Only {len(runs)} recent runs; allowing batch')
          else:
              failures = sum(1 for run in runs if run.get('conclusion') == 'failure')
              rate = failures / len(runs)
              print(f'Recent build-bsgenome failure rate: {failures}/{len(runs)} ({rate:.0%})')
              if rate >= 0.80:
                  print('CIRCUIT BREAKER OPEN: skipping dispatch')
                  breaker_open = True
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'breaker_open={"true" if breaker_open else "false"}\n')
          PYEOF

      - name: Checkout main (for build tools)
        if: steps.queue.outputs.has_work == 'true' && steps.breaker.outputs.breaker_open != 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Trigger builds via API
        if: steps.queue.outputs.has_work == 'true' && steps.breaker.outputs.breaker_open != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, urllib.request, time, os

          with open('batch.json') as f:
              batch = json.load(f)

          token = os.environ['GH_TOKEN']
          repo = '${{ github.repository }}'

          for item in batch:
              accession = item.get('accession')
              organism = item.get('organism')
              assembly_raw = item.get('assembly')
              if not accession or not organism or not assembly_raw:
                  print(f'Skipped: missing fields - accession={accession!r}, organism={organism!r}, assembly={assembly_raw!r}')
                  continue
              parts = organism.split()
              abbrev = parts[0][0].upper() + parts[1].lower() if len(parts) >= 2 else parts[0]
              assembly = assembly_raw.replace('.','').replace(' ','').replace('-','').replace('_','')
              is_ensembl = item.get('data_source') == 'ensembl'
              provider = 'Ensembl' if is_ensembl else 'NCBI'
              package_name = f'BSgenome.{abbrev}.{provider}.{assembly}'

              if is_ensembl:
                  data_source = 'ensembl'
                  source_url = f'https://www.ensembl.org/{item.get(\"species_url\", organism.replace(\" \", \"_\"))}/Info/Index'
              else:
                  data_source = 'ncbi'
                  source_url = f'https://www.ncbi.nlm.nih.gov/datasets/genome/{accession}/'

              extra_fields = {
                  'data_source': data_source,
                  'release_date': '',
                  'title': f'Full genome sequences for {organism} ({provider} version {item[\"assembly\"]})',
                  'source_url': source_url,
              }
              if is_ensembl:
                  extra_fields['species_url'] = item.get('species_url', '')
                  extra_fields['ensembl_group'] = item.get('group', '')

              payload = {
                  'event_type': 'build_bsgenome',
                  'client_payload': {
                      'job_id': accession.replace('_','').replace('.','')[-8:],
                      'package_name': package_name,
                      'organism': organism,
                      'common_name': '',
                      'genome': item['assembly'],
                      'provider': provider,
                      'version': '1.0.0',
                      'circ_seqs': 'character(0)',
                      'accession': accession,
                      'extra': json.dumps(extra_fields)
                  }
              }

              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/dispatches',
                  data=json.dumps(payload).encode(),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
                  method='POST'
              )
              try:
                  urllib.request.urlopen(req)
                  print(f'Triggered: {accession} -> {package_name}')
              except Exception as e:
                  print(f'Failed: {accession} -> {e}')

              # Wait between dispatches to avoid rate limits
              time.sleep(10)
          "

      - name: Update queue status
        if: steps.queue.outputs.has_work == 'true' && steps.breaker.outputs.breaker_open != 'true'
        run: |
          # Switch back to gh-pages to update the queue
          cd ${{ github.workspace }}

          python3 -c "
          import json

          with open('batch.json') as f:
              batch = json.load(f)
          batch_accessions = {item['accession'] for item in batch}

          with open('build-queue.json') as f:
              queue = json.load(f)

          for item in queue:
              if item['accession'] in batch_accessions:
                  item['status'] = 'building'

          with open('build-queue.json', 'w') as f:
              json.dump(queue, f, indent=2)

          building = sum(1 for item in queue if item['status'] == 'building')
          done = sum(1 for item in queue if item['status'] == 'done')
          pending = sum(1 for item in queue if item['status'] == 'pending')
          print(f'Queue: {pending} pending, {building} building, {done} done')
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-queue.json
          git diff --cached --quiet || git commit -m "batch: Mark $(cat batch.json | python3 -c 'import json,sys;print(len(json.load(sys.stdin)))') packages as building"
          git push origin gh-pages
