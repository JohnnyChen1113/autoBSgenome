name: Batch Build BSgenome Packages

on:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of packages to build in this batch"
        default: "15"
        type: string

permissions:
  contents: write

concurrency:
  group: bsgenome-batch
  cancel-in-progress: false

jobs:
  build-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout gh-pages (for queue state)
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Checkout main (for build tools)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Check for pending builds
        id: queue
        run: |
          if [ ! -f build-queue.json ]; then
            echo "No build queue found. Run generate-build-queue.py first."
            echo "has_work=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          BATCH_SIZE="${{ inputs.batch_size || '15' }}"

          # First: mark 'building' items as 'done' if their pkg- release exists
          python3 <<'PYEOF' || true
          import json, subprocess, sys
          sys.path.insert(0, 'main-repo/scripts')
          from normalize_package_name import build_package_name

          with open('build-queue.json') as f:
              queue = json.load(f)

          result = subprocess.run(
              ['gh', 'release', 'list', '--repo', '${{ github.repository }}', '--limit', '500', '--json', 'tagName'],
              capture_output=True, text=True
          )
          existing_tags = set()
          try:
              existing_tags = {r['tagName'] for r in json.loads(result.stdout)}
          except Exception:
              pass

          updated = 0
          for item in queue:
              if item['status'] not in ('building', 'pending'):
                  continue
              provider = 'Ensembl' if item.get('data_source') == 'ensembl' else 'NCBI'
              name, _ = build_package_name(item.get('organism',''), provider, item.get('assembly',''))
              if name and f'pkg-{name}' in existing_tags:
                  item['status'] = 'done'
                  updated += 1

          if updated > 0:
              with open('build-queue.json', 'w') as f:
                  json.dump(queue, f)
              print(f'Marked {updated} items as done')
          PYEOF

          # Then: pick next batch (skipping items whose name won't normalize)
          BATCH_SIZE=$BATCH_SIZE python3 <<'PYEOF' > /tmp/queue_check.txt
          import json, os, sys
          sys.path.insert(0, 'main-repo/scripts')
          from normalize_package_name import build_package_name

          batch_size = int(os.environ['BATCH_SIZE'])
          with open('build-queue.json') as f:
              queue = json.load(f)

          pending = []
          for item in queue:
              if item['status'] != 'pending': continue
              if not (item.get('accession') and item.get('assembly') and item.get('organism')): continue
              provider = 'Ensembl' if item.get('data_source') == 'ensembl' else 'NCBI'
              name, reason = build_package_name(item['organism'], provider, item['assembly'])
              if not name:
                  print(f'  [skip-malformed] {item["accession"]} {item["organism"]}: {reason}')
                  continue
              pending.append(item)

          batch = pending[:batch_size]
          print(f'Pending: {len(pending)}, Batch size: {len(batch)}')
          if not batch:
              print('NO_WORK')
          else:
              with open('batch.json', 'w') as f:
                  json.dump(batch, f)
              for item in batch:
                  print(f'  - {item["accession"]} {item["organism"]} [{item.get("data_source","ncbi")}]')
          PYEOF
          cat /tmp/queue_check.txt

          if grep -q "NO_WORK" /tmp/queue_check.txt; then
            echo "has_work=false" >> $GITHUB_OUTPUT
          else
            echo "has_work=true" >> $GITHUB_OUTPUT
          fi

      - name: Failure-rate circuit breaker
        if: steps.queue.outputs.has_work == 'true'
        id: breaker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: |
          # Skip dispatch when recent build-bsgenome failure rate >= 80%. Cron retries
          # next tick, so the breaker auto-clears once a systemic issue is fixed.
          python3 <<'PYEOF'
          import json, os, subprocess
          r = subprocess.run(
              ['gh', 'run', 'list', '--workflow', 'build-bsgenome.yml',
               '--repo', os.environ['GITHUB_REPOSITORY'], '--limit', '30',
               '--status', 'completed', '--json', 'conclusion'],
              capture_output=True, text=True
          )
          runs = json.loads(r.stdout or '[]') if r.returncode == 0 else []
          breaker_open = False
          if r.returncode != 0:
              print('Could not query run history; allowing batch to proceed')
          elif len(runs) < 10:
              print(f'Only {len(runs)} recent runs; allowing batch')
          else:
              failures = sum(1 for run in runs if run.get('conclusion') == 'failure')
              rate = failures / len(runs)
              print(f'Recent build-bsgenome failure rate: {failures}/{len(runs)} ({rate:.0%})')
              if rate >= 0.80:
                  print('CIRCUIT BREAKER OPEN: skipping dispatch')
                  breaker_open = True
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'breaker_open={"true" if breaker_open else "false"}\n')
          PYEOF

      - name: Trigger builds via API
        if: steps.queue.outputs.has_work == 'true' && steps.breaker.outputs.breaker_open != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 <<'PYEOF'
          import json, os, sys, time, urllib.request
          sys.path.insert(0, 'main-repo/scripts')
          from normalize_package_name import build_package_name

          with open('batch.json') as f:
              batch = json.load(f)
          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']

          for item in batch:
              accession = item['accession']
              organism = item['organism']
              assembly_raw = item['assembly']
              is_ensembl = item.get('data_source') == 'ensembl'
              provider = 'Ensembl' if is_ensembl else 'NCBI'

              package_name, reason = build_package_name(organism, provider, assembly_raw)
              if not package_name:
                  print(f'Skipped (malformed): {accession} {organism}: {reason}')
                  continue

              if is_ensembl:
                  species_url = item.get('species_url') or organism.replace(' ', '_')
                  source_url = f'https://www.ensembl.org/{species_url}/Info/Index'
              else:
                  source_url = f'https://www.ncbi.nlm.nih.gov/datasets/genome/{accession}/'

              extra_fields = {
                  'data_source': 'ensembl' if is_ensembl else 'ncbi',
                  'release_date': '',
                  'title': f'Full genome sequences for {organism} ({provider} version {assembly_raw})',
                  'source_url': source_url,
              }
              if is_ensembl:
                  extra_fields['species_url'] = item.get('species_url', '')
                  extra_fields['ensembl_group'] = item.get('group', '')

              payload = {
                  'event_type': 'build_bsgenome',
                  'client_payload': {
                      'job_id': accession.replace('_', '').replace('.', '')[-8:],
                      'package_name': package_name,
                      'organism': organism,
                      'common_name': '',
                      'genome': assembly_raw,
                      'provider': provider,
                      'version': '1.0.0',
                      'circ_seqs': 'character(0)',
                      'accession': accession,
                      'extra': json.dumps(extra_fields),
                  },
              }

              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/dispatches',
                  data=json.dumps(payload).encode(),
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
                  method='POST',
              )
              try:
                  urllib.request.urlopen(req)
                  print(f'Triggered: {accession} -> {package_name}')
              except Exception as e:
                  print(f'Failed: {accession} -> {e}')

              time.sleep(10)
          PYEOF

      - name: Update queue status
        if: steps.queue.outputs.has_work == 'true' && steps.breaker.outputs.breaker_open != 'true'
        run: |
          cd ${{ github.workspace }}

          # Mark dispatched items as 'building' in-place. Keep the minified JSON
          # format that matches the canonical on-disk layout (indent=2 would
          # produce a spurious 139K-line diff).
          python3 <<'PYEOF'
          import json
          with open('batch.json') as f: batch = json.load(f)
          batch_accessions = {item['accession'] for item in batch}
          with open('build-queue.json') as f: queue = json.load(f)
          for item in queue:
              if item['accession'] in batch_accessions:
                  item['status'] = 'building'
          with open('build-queue.json', 'w') as f:
              json.dump(queue, f, separators=(', ', ': '))
          n = lambda s: sum(1 for it in queue if it['status'] == s)
          print(f"Queue: {n('pending')} pending, {n('building')} building, {n('done')} done")
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-queue.json
          git diff --cached --quiet && exit 0

          BATCH_COUNT=$(python3 -c 'import json;print(len(json.load(open("batch.json"))))')
          git commit -m "batch: Mark $BATCH_COUNT packages as building"

          # Retry on push conflicts — update-repo-index.yml can land commits on
          # gh-pages between our checkout and push.
          for attempt in 1 2 3 4 5; do
            if git push origin gh-pages; then
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing on latest gh-pages..."
            git fetch origin gh-pages
            git rebase origin/gh-pages || { echo "Rebase failed; aborting."; exit 1; }
          done
          echo "ERROR: push still failing after 5 attempts"
          exit 1
