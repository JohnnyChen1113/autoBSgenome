name: Refresh Triticum timopheevii Zenodo description

# One-shot: rewrite record 19653884's description to the richer HTML format
# that newer records get automatically. Also drops the inaccurate "public
# genome assemblies" phrasing from the original upload.

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Prepare description HTML
        run: |
          cat > /tmp/wheat-desc.html <<'EOF'
          <p>BSgenome data package for <i>Triticum timopheevii</i> (assembly <code>WRC_timopheevii_genome_with_organelles</code>), generated by <a href='https://autobsgenome.pages.dev'>autoBSgenome</a> from the Ensembl reference assembly.</p>
          <table>
            <tr><th>Organism</th><td>Triticum timopheevii</td></tr>
            <tr><th>Assembly</th><td>WRC_timopheevii_genome_with_organelles</td></tr>
            <tr><th>Data source</th><td><b>Ensembl</b></td></tr>
            <tr><th>Accession</th><td><a href='https://www.ebi.ac.uk/ena/browser/view/GCA_963921465.1'>GCA_963921465.1</a></td></tr>
            <tr><th>Package</th><td><code>BSgenome.Ttimopheevii.Ensembl.WRCtimopheeviigenomewithorganelles</code></td></tr>
          </table>
          <p><b>Install in R:</b></p>
          <pre>install.packages("https://zenodo.org/records/19653884/files/BSgenome.Ttimopheevii.Ensembl.WRCtimopheeviigenomewithorganelles_1.0.0.tar.gz", repos = NULL, type = "source")</pre>
          <p>Part of the <a href='https://zenodo.org/communities/autobsgenome'>autoBSgenome</a> community. autoBSgenome builds Bioconductor-compatible BSgenome packages from any reference genome assembly — from public databases (NCBI, Ensembl) or from user-provided FASTA. Records in this community archive the tarballs that exceed GitHub Releases' 2 GiB asset limit; smaller packages are hosted on GitHub Releases under the same project.</p>
          EOF

      - name: Update Zenodo record metadata
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          python3 scripts/zenodo_upload.py update-metadata 19653884 \
            --description-file /tmp/wheat-desc.html \
            --title "BSgenome.Ttimopheevii.Ensembl.WRCtimopheeviigenomewithorganelles 1.0.0 (Ensembl — Triticum timopheevii)" \
            --keywords "BSgenome,Bioconductor,Triticum timopheevii,Ensembl,WRC_timopheevii_genome_with_organelles,autoBSgenome,R package,reference genome,eukaryote" \
            --related "https://www.ebi.ac.uk/ena/browser/view/GCA_963921465.1,https://github.com/JohnnyChen1113/autoBSgenome,https://autobsgenome.pages.dev"
