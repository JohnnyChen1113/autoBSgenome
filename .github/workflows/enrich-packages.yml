name: Enrich Package Metadata

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sundays at 6:00 AM UTC
    - cron: "0 6 * * 0"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout enrichment script
        uses: actions/checkout@v4
        with:
          ref: main
          path: _main
          sparse-checkout: scripts/enrich-packages.py
          sparse-checkout-cone-mode: false

      - name: Run enrichment
        run: |
          python3 _main/scripts/enrich-packages.py packages.json > packages-enriched.json
          mv packages-enriched.json packages.json
          rm -rf _main

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages.json
          git diff --cached --quiet || {
            git commit -m "chore: Enrich package metadata (taxonomy, sequences)"
            git push
          }
