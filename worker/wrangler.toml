name = "autobsgenome-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
routes = [
  { pattern = "api.autobsgenome.org", custom_domain = true, zone_name = "autobsgenome.org" },
]

[vars]
GITHUB_REPO = "JohnnyChen1113/autoBSgenome"
ALLOWED_ORIGIN = "https://autobsgenome.org,https://www.autobsgenome.org,https://autobsgenome.pages.dev,https://autobsgenome.bioinfoark.workers.dev"

[[r2_buckets]]
binding = "FASTA_UPLOADS"
bucket_name = "autobsgenome-fasta-uploads"
